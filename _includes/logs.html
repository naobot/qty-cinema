<div class="logs">
{% for log in site.data.logs %}
<div class="a-log">
  {% if log.image and log.image != '' %}<div class="film-image"><a href="{{ log.link }}"><img src="{{ log.image | relative_url }}"></a></div>{% endif %}

  <h1 class="log-name"><a href="{{ log.link }}">{{ log.title }}</a></h1>
  <p>{{ log.description | smartify }}</p>
</div>
{% endfor %}
</div>
