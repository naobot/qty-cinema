- title: M Butterfly
  director: David Cronenberg
  link: http://www.google.com
  synopsis: Loosely based on true events (see <a href="https://en.wikipedia.org/wiki/Bernard_Boursicot">Bernard Boursicot</a> and <a href="https://en.wikipedia.org/wiki/Shi_Pei_Pu">Shi Pei Pu</a>), the film concerns René Gallimard (Jeremy Irons), a French diplomat assigned to Beijing, China, in the 1960s. He becomes infatuated with a Peking opera performer, Song Liling (John Lone), who spies on him for the Government of the People’s Republic of China. Their affair lasts for 20 years, with Gallimard all the while apparently unaware (or willfully ignorant) of the fact that in Peking opera, Dan roles are traditionally performed by men.
  release: October 1 1993
  image: assets/images/movies/m_butterfly.png
- title: Children Who Draw
  director: Susumu Hani
  link: http://www.google.com
  synopsis: Children Who Draw explores the delicate chemistry of school children interacting in an art class through a constant juxtaposition of observational black-and-white portraits of the young children with lyrical passages shot in vivid color exploring their imaginative and expressive paintings. Experimenting with color as an intimate expression of the children’s inner worlds, a tool for deeper psychological investigation, Hani allows his camera to roam freely across the drawings, “de-framing” and enagaging the artwork in a manner reminiscent of Alain Resnais.
  release: 1956
  image: assets/images/movies/img2.png
