  synopsis: Children Who Draw explores the delicate chemistry of school children interacting
    in an art class through a constant juxtaposition of observational black-and-white
    portraits of the young children with lyrical passages shot in vivid color exploring
    their imaginative and expressive paintings. Experimenting with color as an intimate
    expression of the children’s inner worlds, a tool for deeper psychological investigation,
    Hani allows his camera to roam freely across the drawings, “de-framing” and enagaging
    the artwork in a manner reminiscent of Alain Resnais.
