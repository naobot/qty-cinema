---
layout: content
---

{% if page.image and page.image != '' %}<div class="film-image"><img  src="{{ page.image | relative_url }}"></div>{% endif %}

<div class="film-heading">
  <div class="film-info">
    <h1 class="film-title">{{ page.title }}</h1>
    <h2 class="film-director">{{ page.director }}</h2>
  </div>
  {% if page.watch and page.watch != '' %}<div class="watch-button">
    <a href="{{ page.watch | relative_url }}" target="_blank">[watch]</a>
  </div>{% endif %}
</div>

<div class="synopsis">
  <p>{{ page.synopsis | smartify }}</p>
</div>

<div class="film-additional-content">
{{ content }}
</div>
