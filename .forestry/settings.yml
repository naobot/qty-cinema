---
new_page_extension: md
auto_deploy: false
admin_path: ''
webhook_url: 
sections:
- type: document
  path: about.md
  label: About
- type: directory
  path: _movies
  label: Movies
  create: all
  match: "**/*"
  templates:
  - movie
- type: jekyll-posts
  label: Criticism
  create: documents
  templates:
  - post
- type: document
  path: _data/logs.yaml
  label: Logs
- type: document
  path: _data/events.yaml
  label: Events
- type: directory
  path: _authors
  label: Authors
  create: documents
  match: "**/*"
  templates:
  - author
- type: jekyll-pages
  label: Pages
  create: none
upload_dir: assets/uploads
public_path: "/assets/uploads"
front_matter_path: ''
use_front_matter_path: false
file_template: ":filename:"
build:
  preview_env:
  - JEKYLL_ENV=staging
  preview_output_directory: _site
  install_dependencies_command: bundle install --path vendor/bundle
  preview_docker_image: forestryio/ruby:2.6
  mount_path: "/srv"
  working_dir: "/srv"
  instant_preview_command: bundle exec jekyll serve --drafts --unpublished --future
    --port 8080 --host 0.0.0.0 -d _site
