---
label: Movie
hide_body: false
fields:
- name: link
  type: boolean
  label: Link
  description: Link to individual film page
  default: true
- type: text
  name: title
  label: Title
  config:
    required: true
- type: text
  name: director
  label: Director
  config:
    required: true
- type: text
  name: watch
  label: Watch Link
  description: (Don't forget to include "http://")
- type: textarea
  name: synopsis
  label: Synopsis
  description: Provide a movie synopsis
  hidden: false
  default: Synopsis here!
  config:
    wysiwyg: true
    schema:
      format: markdown
- name: release
  type: datetime
  description: Only the year will appear, but day and month are taken into consideration
    for display order. (Ordered by most recent at the top.)
  config:
    required: false
    date_format: YYYY-MM-DD
    time_format: 
    display_utc: false
    export_format: YYYY-MM-DD
  label: Release Date
  default: now
- type: file
  name: image
  label: Preview Image
- name: layout
  type: text
  config:
    required: false
  label: Layout
  hidden: true
  default: movie
