---
label: Movie
hide_body: true
fields:
- type: field_group_list
  name: Movies
  label: Movies
  fields:
  - type: text
    name: title
    label: Title
    config:
      required: true
  - type: text
    name: director
    label: Director
    config:
      required: true
  - type: text
    name: link
    label: Link
    description: (Don't forget to include "http://")
  - type: textarea
    name: synopsis
    label: Synopsis
    config:
      required: true
      wysiwyg: true
      schema:
        format: markdown
  - type: text
    name: release
    label: Release Date
  - type: file
    name: image
    label: Preview Image
